bt_navigator:
  # Função: O orquestrador principal da navegação. 
  # Ele usa Árvores de Comportamento (Behavior Trees - BT) para chamar outros servidores (planner, controller, etc.) 
  # e executar uma tarefa de navegação complexa, como "ir para um ponto".
  ros__parameters:
    # --- Frames e Tópicos Fundamentais ---
    global_frame: map                  # [string, default: "map"] Frame de referência global para toda a navegação.
    robot_base_frame: base_footprint   # [string, default: "base_link"] Frame de referência do robô, usado para obter sua posição.
    odom_topic: /odom                  # [string, default: "odom"] Tópico da odometria, usado por alguns comportamentos.
    use_sim_time: false                # [bool, default: false] Usar o tempo de simulação (ex: do Gazebo) em vez do tempo real.

    # --- Configurações de Comportamento e Timeout ---
    bt_loop_duration: 10                 # [int, default: 10] Frequência em Hz com que a árvore de comportamento é "executada" (tick).
    default_server_timeout: 20           # [int, default: 20] Timeout em milissegundos para esperar por servidores de ação (planner, controller).
    wait_for_service_timeout: 2000       # [int, default: 1000] Timeout em milissegundos para esperar que um serviço (como o do lifecycle manager) apareça.
    action_server_result_timeout: 2000.0  # [double, default: 900.0] Tempo em segundos que o resultado de uma ação fica disponível antes de ser descartado.

    # --- Seleção de Navegadores e Árvores de Comportamento ---
    navigators: ["navigate_to_pose"]     # [vector<string>] Lista de "navegadores" que este servidor oferece. Cada um corresponde a uma ação ROS (ex: /navigate_to_pose).
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator" # [string] Plugin que implementa a lógica para a ação "navigate_to_pose".

    # Caminho absoluto para o arquivo XML que define a árvore de comportamento a ser usada para a ação "navigate_to_pose".
    # Este é o "cérebro" que define a sequência: planejar -> controlar -> recuperar de falhas.
    # default_nav_to_pose_bt_xml: "/home/ubuntu/ros2_ws/src/nav_hub/btree/nav_on_route_graph_updated.xml" # --> updated é cara mais recente (02/04/2026)
    default_nav_to_pose_bt_xml: "/home/ubuntu/ros2_ws/src/nav_hub/btree/nav_on_route_graph_oregon.xml"
    # default_nav_to_pose_bt_xml: "/home/ubuntu/ros2_ws/src/nav_hub/btree/nav_on_route_graph_with_track.xml"
    # default_nav_to_pose_bt_xml: "/home/ubuntu/ros2_ws/src/nav_hub/btree/nav_on_route_graph_waiting_for_obstacle.xml"

    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.

    # plugin_lib_names is used to add custom BT plugins to the executor (vector of strings).
    # Built-in plugins are added automatically
    # plugin_lib_names: []

    # --- Plugins e Códigos de Erro (Geralmente não alterados) ---
    # plugin_lib_names: []               # [vector<string>] Para carregar bibliotecas de plugins de BT customizados.
    # error_code_names:                    # [vector<string>] Mapeia nomes de códigos de erro para a porta "error_code" na BT.
    #   - compute_path_error_code
    #   - follow_path_error_code

route_server:
  ros__parameters:
    # The graph_filepath does not need to be specified since it going to be set by defaults in launch.
    # If you'd rather set it in the yaml, remove the default "graph" value in the launch file(s).
    # file & provide full path to map below. If graph config or launch default is provided, it is used
    # graph_filepath: $(find-pkg-share nav2_route)/graphs/dentalmed_final.json
    graph_filepath: $(find-pkg-share nav_hub)/graphs/oregon.json
    # graph_filepath: $(find-pkg-share nav_hub)/graphs/aceleradoras.json
    # graph_filepath: $(find-pkg-share nav_hub)/graphs/teste.json
    # graph_filepath: $(find-pkg-share nav_hub)/graphs/teste_oregon.json
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    smooth_corners: true
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      max_collision_dist: 3.0
    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"
      invalid_on_collision: false

map_server:
  # Função: Carrega um mapa estático (geralmente de um arquivo .yaml) e o publica no tópico /map 
  # para que outros nós (como AMCL e Global Costmap) possam usá-lo.
  ros__parameters:
    use_sim_time: false                  # [bool, default: false] Usar tempo de simulação.
    frame_id: map                      # [string, default: "map"] O nome do frame em que o mapa é publicado. Deve corresponder ao global_frame.
    topic_name: map                    # [string, default: "map"] O nome do tópico onde o mapa (nav_msgs/msg/OccupancyGrid) é publicado.
    
    # Caminho para o arquivo .yaml que descreve o mapa. Este arquivo aponta para o arquivo de imagem (.pgm) e contém metadados como resolução e origem.
    # yaml_filename: "/home/ubuntu/ros2_ws/src/nav_hub/maps/aceleradoras.yaml"
    yaml_filename: "/home/ubuntu/ros2_ws/src/nav_hub/maps/oregon.yaml"

speed_filter_mask_server:
  ros__parameters:
    topic_name: "/speed_filter_mask"
    # yaml_filename: "/home/ubuntu/ros2_ws/src/nav_hub/maps/aceleradoras_speed_mask.yaml"
    yaml_filename: "/home/ubuntu/ros2_ws/src/nav_hub/maps/oregon_speed_mask.yaml"


