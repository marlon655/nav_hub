local_costmap:
  # Função: Cria um pequeno mapa de custos centrado no robô. 
  # Ele é "rolante" (rolling window), movendo-se com o robô. 
  # Sua principal função é detectar obstáculos dinâmicos e próximos usando sensores como o LiDAR. 
  # É usado pelo controlador local para evitar colisões imediatas.
  local_costmap:
    ros__parameters:
      # --- Frequência e Frames ---
      update_frequency: 5.0                # [double, default: 5.0] Frequência em Hz com que o mapa de custos é atualizado com novos dados de sensores.
      publish_frequency: 1.0               # [double, default: 1.0] Frequência em Hz com que o mapa de custos é publicado para visualização (ex: no RViz).
      global_frame: odom                 # [string, default: "odom"] Frame de referência para o mapa local. 'odom' é comum para que o mapa não salte com as correções do AMCL.
      robot_base_frame: base_footprint   # [string, default: "base_link"] Frame do robô.

      # --- Configuração da Janela Rolante ---
      use_sim_time: false                  # [bool, default: false] Usar tempo de simulação.
      rolling_window: true                 # [bool, default: false] Habilita o modo "janela rolante", onde o mapa se move com o robô. Essencial para o mapa local.
      width: 8                             # [int, default: 10] Largura do mapa em metros.
      height: 8                            # [int, default: 10] Altura do mapa em metros.
      resolution: 0.05                   # [double, default: 0.05] Resolução do mapa em metros/pixel. Menor = mais detalhado, mais caro computacionalmente.

      # --- Geometria do Robô ---
      # Define o contorno 2D do robô como uma lista de pontos [x, y]. Usado para colisões e inflação.
      # footprint: "[[0.16, -0.25], [0.16, 0.25], [-0.40, 0.25], [-0.40, -0.25]]" #default
      footprint: "[[0.26, -0.25], [0.26,  0.25], [-0.26,  0.25], [-0.26,  0.085], [-0.54,  0.085], [-0.54, -0.085], [-0.26, -0.085], [-0.26, -0.25]]" #OREGON
      # footprint: "[[0.85, -0.35], [0.85, 0.35], [-0.85, 0.35], [-0.85, -0.35]]" #dentalmed
      # robot_radius: 0.35                # [double] Alternativa ao footprint para robôs circulares.

      # --- Camadas (Layers) do Mapa de Custos ---
      # plugins: ["obstacle_layer", "inflation_layer", "stvl_layer"] # [vector<string>] Lista de camadas a serem usadas para construir o mapa de custos final.
      plugins: ["obstacle_layer", "inflation_layer"] # [vector<string>] Lista de camadas a serem usadas para construir o mapa de custos final.

      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer" # [string] Plugin que "infla" os obstáculos, criando uma zona de segurança ao redor deles.
        inflate_unknown: true                # [bool, default: false] Se deve inflar células desconhecidas.
        cost_scaling_factor: 10.0             # [double, default: 10.0] Fator de decaimento do custo. Menor = decaimento mais lento.
        inflation_radius: 0.3                # [double, default: 0.55] Raio em metros da zona de inflação ao redor dos obstáculos.
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer" # [string] Plugin que adiciona leituras de sensores (como LaserScan) ao mapa de custos.
        enabled: True                        # [bool, default: True] Habilita a camada.
        observation_sources: scan            # [string] Nomes das fontes de observação a serem usadas (definidas abaixo).
        scan:
          topic: /scan                       # [string] Tópico do sensor.
          max_obstacle_height: 2.0           # [double, default: 2.0] Altura máxima para considerar uma leitura como obstáculo.
          clearing: True                     # [bool, default: True] Permite que o sensor limpe o espaço livre.
          marking: True                      # [bool, default: True] Permite que o sensor marque novos obstáculos.
          data_type: "LaserScan"             # [string] Tipo de dados do sensor.
          raytrace_max_range: 8.0            # [double, default: 3.0] Distância máxima para limpar o espaço livre.
          raytrace_min_range: 0.0            # [double, default: 0.0] Distância mínima para limpar o espaço livre.
          obstacle_max_range: 2.5            # [double, default: 2.5] Distância máxima para marcar obstáculos.
          obstacle_min_range: 0.0            # [double, default: 0.0] Distância mínima para marcar obstáculos.

          # Permite que o costmap trate os valores 'inf' (infinito) do laser
          # como leituras válidas, limpando o espaço livre até o alcance máximo do sensor.
          # Essencial para ambientes abertos.
          inf_is_valid: true
          
      stvl_layer:
        plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
        enabled: true
        voxel_decay: 4.
        decay_model: 0 #linear
        voxel_size: 0.1
        track_unknown_space: true
        unknown_threshold: 15
        mark_threshold: 0
        update_footprint_enabled: true
        combination_method: 1 # MAX (pega o maior custo entre camadas)
        origin_z: 0.0
        publish_voxel_map: true #True apenas para debug, alto custo computacional
        transform_tolerance: 0.2
        mapping_mode: false # false p/ navegacao
        map_save_duration: 60.0
        observation_sources: pointcloud
        pointcloud:
          data_type: PointCloud2
          # topic: /cloud
          topic: /ground_segmentation/obstacle_points
          marking: true
          clearing: true
          obstacle_range: 1.8
          min_obstacle_height: 0.0
          max_obstacle_height: 1.6
          expected_update_rate: 0.0
          observation_persistence: 0.0
          inf_is_valid: false
          filter: "voxel" # "passthrough" ou "voxel"
          voxel_min_points: 6 # com 20 pontos ele pega menos lixo, considerar parametro de binning ou algo asism?
          clear_after_reading: true
          max_z: 1.0
          min_z: 0.2
          vertical_fov_angle: 1.047 # maix sense tem 60 graus de fov vertical, ou seja, 1.047 radianos
          horizontal_fov_angle: 1.22 #maix sense tem 70 graus de fov vertical, ou seja, 1.22 radianos
          decay_acceleration: 10.0
          model_type: 0


      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        
      always_send_full_costmap: True       # [bool, default: False] Publica o mapa de custos inteiro em vez de apenas as atualizações. Útil para algumas ferramentas de depuração.


global_costmap:
  # Função: Cria um mapa de custos do tamanho do mapa estático inteiro. 
  # Ele combina o mapa estático (paredes, etc.) com obstáculos detectados por sensores.
  # É usado pelo planejador global para encontrar um caminho do início ao fim que evite obstáculos conhecidos.
  global_costmap:
    ros__parameters:
      # --- Frequência e Frames ---
      update_frequency: 5.0                # [double, default: 5.0] Frequência de atualização.
      publish_frequency: 1.0               # [double, default: 1.0] Frequência de publicação para visualização.
      transform_tolerance: 0.5            # [double, default: 0.5] Tolerância de tempo para transformadas (TF).
      global_frame: map                    # [string, default: "map"] Frame de referência global.
      robot_base_frame:  base_footprint    # [string, default: "base_link"] Frame do robô.
      use_sim_time: false                  # [bool, default: false]

      # --- Geometria e Resolução ---
      # footprint: "[[0.16, -0.25], [0.16, 0.25], [-0.40, 0.25], [-0.40, -0.25]]" # [string] Contorno do robô. #default
      footprint: "[[0.26, -0.25], [0.26,  0.25], [-0.26,  0.25], [-0.26,  0.085], [-0.54,  0.085], [-0.54, -0.085], [-0.26, -0.085], [-0.26, -0.25]]" #OREGON
      # robot_radius: 0.35 
      # footprint: "[[0.85, -0.35], [0.85, 0.35], [-0.85, 0.35], [-0.85, -0.35]]" #dentalmed
      resolution: 0.05                    # [double, default: 0.05] Resolução do mapa. DEVE ser a mesma do mapa estático.
      track_unknown_space: true            # [bool, default: false] Trata o espaço desconhecido como potencialmente transitável ou não.

      # --- Camadas (Layers) ---
      # A ordem é importante: estático primeiro, depois obstáculos, depois inflação.
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      filters: ["speed_filter"] 
      
      obstacle_layer:
        # Configuração idêntica à do mapa local, para adicionar obstáculos em tempo real ao mapa global.
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan                       # [string] Tópico do sensor.
          max_obstacle_height: 2.0           # [double, default: 2.0] Altura máxima para considerar uma leitura como obstáculo.
          clearing: True                     # [bool, default: True] Permite que o sensor limpe o espaço livre.
          marking: True                      # [bool, default: True] Permite que o sensor marque novos obstáculos.
          data_type: "LaserScan"             # [string] Tipo de dados do sensor.
          raytrace_max_range: 5.0            # [double, default: 3.0] Distância máxima para limpar o espaço livre.
          raytrace_min_range: 0.0            # [double, default: 0.0] Distância mínima para limpar o espaço livre.
          obstacle_max_range: 2.5            # [double, default: 2.5] Distância máxima para marcar obstáculos.
          obstacle_min_range: 0.0            # [double, default: 0.0] Distância mínima para marcar obstáculos.
          
          # Permite que o costmap trate os valores 'inf' (infinito) do laser
          # como leituras válidas, limpando o espaço livre até o alcance máximo do sensor.
          # Essencial para ambientes abertos.
          inf_is_valid: true
      
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer" # [string] Plugin que se inscreve no tópico /map e adiciona o mapa estático como base.
        map_subscribe_transient_local: True  # [bool, default: false] Usa QoS "transient local" para obter o mapa assim que se conecta.
      
      inflation_layer:
        # Configuração similar à do mapa local, mas o raio de inflação pode ser diferente.
        plugin: "nav2_costmap_2d::InflationLayer"
        inflate_unknown: true
        cost_scaling_factor: 10.0
        inflation_radius: 0.3               # [double, default: 0.55] Raio de inflação, pode ser maior no mapa global para encorajar o planejador a ficar mais longe das paredes.
        
      speed_filter:
        plugin: "nav2_costmap_2d::SpeedFilter"
        enabled: True
        filter_info_topic: "/speed_costmap_filter_info"
        speed_limit_topic: "/speed_limit"
      always_send_full_costmap: True       # [bool, default: False]

amcl:
  # Função: (Adaptive Monte Carlo Localization) - O principal algoritmo de localização do ROS. 
  # Ele estima a posição do robô no mapa estático comparando as leituras do sensor laser (/scan) com o mapa (/map) e usando a odometria (/odom) como uma previsão de movimento.
  ros__parameters:
    use_sim_time: false
    robot_model_type: "nav2_amcl::DifferentialMotionModel"

    # --- Parâmetros do Modelo de Movimento (Ruído da Odometria) ---
    # Controlam a incerteza adicionada a cada passo de odometria. alpha1 e alpha2 para rotação, alpha3 e alpha4 para translação.
    alpha1: 0.2                           # [double, default: 0.2] Ruído rotacional (heading) devido ao movimento rotacional.
    alpha2: 0.2                            # [double, default: 0.2] Ruído rotacional devido ao movimento translacional.
    alpha3: 0.2                            # [double, default: 0.2] Ruído translacional devido ao movimento translacional.
    alpha4: 0.2                            # [double, default: 0.2] Ruído translacional devido ao movimento rotacional.
    # alpha5: 0.2                          # (Não usado em modelos diferenciais)

    # --- Frames ---
    base_frame_id: base_footprint          # [string, default: "base_link"] Frame do robô.
    global_frame_id: map                   # [string, default: "map"] Frame do mapa global.
    odom_frame_id: odom                    # [string, default: "odom"] Frame da odometria.
    scan_topic: scan
    map_topic: map
    
    # --- Parâmetros do Modelo do Sensor (Laser). Definem a Estrutura do Campo---
    laser_model_type: "likelihood_field"   # [string, default: "likelihood_field"] Define como o algoritmo decide se uma pose de robô é "boa" ou "ruim" com base no que o sensor laser está vendo. "Se o robô estivesse exatamente nesta pose (x, y, θ), qual é a probabilidade (likelihood) de ele ter recebido exatamente esta leitura de laser?" 
    # beam: Este modelo tenta simular a física real de um feixe de laser. Para cada partícula (hipótese de pose) e para cada feixe na leitura do laser, ele calcula a probabilidade.  (usa z_hit, z_short, z_max e z_rand) da distância medida por aquele feixe. 
      # Ele faz isso considerando uma mistura de quatro distribuições de probabilidade: (O modelo de feixe então combina essas quatro probabilidades para obter a probabilidade final de uma única leitura.) 
        # 1. Acerto Intrínseco (Hit): A probabilidade de o feixe ter atingido um obstáculo no mapa na distância esperada. Isso é modelado como uma distribuição Gaussiana (um "sino") centrada na distância até o obstáculo mais próximo no mapa naquela direção. Se a leitura do laser bate com a distância no mapa, a probabilidade é alta.
        # 2. Obstáculos Inesperados (Short): Representa a probabilidade de a leitura de um feixe ter sido causada por um obstáculo inesperado (não mapeado) que está mais perto do que o obstáculo no mapa estático. Isso é modelado como uma distribuição exponencial decrescente.
        # 3. Falha de Medição (Max): A probabilidade do feixe não ter capturado nenhum obstáculo e retornado seu alcance máximo, mesmo que no mapa estático houvesse um obstáculo mais perto. Isso é modelado como um pequeno pico de probabilidade na distância máxima do sensor.
        # 4. Medição Aleatória (Rand): O peso da distribuição "aleatória" (Rand). Representa a probabilidade de uma leitura ser completamente aleatória e sem sentido, como um reflexo de um espelho, interferência, pessoas passando.. Isso é modelado como uma distribuição uniforme em toda a faixa do sensor.
    # likelihood_field  (O Padrão Moderno): Este modelo é uma abordagem muito mais prática, rápida e robusta. Em vez de fazer cálculos caros em tempo real, ele faz um pré-processamento inteligente. (usa z_hit e z_rand)
      # Passo 1: Pré-cálculo do Campo de Verossimilhança (Likelihood Field):  Antes de começar a localização, o AMCL pega o mapa estático e pré-calcula um novo grid, o "campo de verossimilhança".
        # Para cada célula (x, y) neste novo grid, ele armazena a distância até o obstáculo mais próximo.
        # Células que são obstáculos têm distância 0. Células a um passo de um obstáculo têm distância 1, e assim por diante. Isso é calculado de forma muito eficiente usando um algoritmo como o "Distance Transform" (usa laser_likelihood_max_dist para limitar qual é a distancia minima estre obstáculos, distancia maiores que esse valor não são calculadas durante o distance transform).
      # Passo 2: Cálculo da Probabilidade em Tempo Real: Agora, para cada partícula (hipótese de pose), o AMCL faz o seguinte para cada feixe do laser:
        # Ele pega o ponto final (endpoint) do feixe medido.
        # Transforma as coordenadas desse ponto para o sistema de coordenadas do mapa, usando a pose da partícula.
        # Ele simplesmente consulta a distância armazenada na célula correspondente do campo de verossimilhança pré-calculado.
        # A probabilidade é então calculada a partir dessa distância consultada, geralmente usando uma distribuição Gaussiana. Se a distância até o obstáculo mais próximo for pequena (o ponto final do feixe caiu perto de um obstáculo no mapa), a probabilidade é alta. Se a distância até o obstáculo mais próximo for grande, o endpoint do feixe entá no "meio do nada", a probabilidade é baixa.

    laser_max_range: 20.0         # -1.0         # [double, default: 100.0] Alcance máximo do laser a ser considerado. -1.0 usa o alcance máximo do próprio sensor.
    laser_min_range: -1.0                  # [double, default: -1.0] Alcance mínimo. -1.0 usa o alcance máximo do próprio sensor.

    max_beams: 1000                         # [int, default: 60] Número máximo de raios do laser a serem usados em cada atualização. Reduzir pode melhorar o desempenho.
    
    # -------- Estes parâmetros são usados uma vez, quando o AMCL recebe o mapa pela primeira vez, para pré-calcular o grid do campo de verossimilhança.--------
    # O Algoritmo "Distance Transform": É aqui que entra o pré-cálculo. Quando o AMCL carrega o mapa pela primeira vez, ele cria um grid interno (o "campo de verossimilhança") e executa um algoritmo chamado Distance Transform.
    #   1. Inicialização: O algoritmo começa com o mapa de ocupação. Todas as células que são obstáculos recebem um valor de distância 0. Todas as outras células (espaço livre e desconhecido) recebem um valor de infinito.
    #   2. Propagação: O algoritmo então "propaga" as distâncias para fora a partir dos obstáculos. Ele percorre o mapa e, para cada célula livre, calcula sua distância até seus vizinhos que já têm uma distância calculada. Ele se atualiza com a menor distância possível. Esse processo se repete até que todas as células livres tenham um valor de distância estável. O resultado é um mapa onde cada célula contém o valor da sua distância euclidiana até o obstáculo mais próximo.
    # O Papel do laser_likelihood_max_dist: Fazer a "Distance Transform" para um mapa inteiro pode ser computacionalmente caro, especialmente para mapas grandes. Se um ponto está a mais de alguns metros de um obstáculo, sua probabilidade já é tão baixa que não faz diferença se a distância exata é 10 ou 11 metros. É aqui que o laser_likelihood_max_dist entra como uma otimização crucial: laser_likelihood_max_dist define um "horizonte" ou um "corte" para o algoritmo de Distance Transform. O algoritmo só calculará as distâncias até este limite máximo.
    laser_likelihood_max_dist: 0.3         # [double, default: 2.0] Maximum distance to do obstacle inflation on map, for use in likelihood_field model. Ele define a distância máxima a partir de um obstáculo que será considerada no cálculo do campo de verossimilhança (distance transform).
    # Intuição: Qualquer célula no mapa que esteja a uma distância maior que laser_likelihood_max_dist de qualquer obstáculo receberá uma probabilidade muito baixa (ou zero). Essencialmente, ele cria uma "aura" ou "brilho" com este raio ao redor de todos os obstáculos no mapa
    # Valor maior: Cria uma "aura" maior. Isso é útil em ambientes abertos ou com poucos detalhes, pois permite que o AMCL use leituras de laser que estão mais distantes das paredes para se localizar. A desvantagem é que aumenta o custo computacional do pré-cálculo.
    # Valor menor: Cria uma "aura" mais estreita. Isso é bom para ambientes densos como corredores, onde você só quer considerar as paredes mais próximas. Um valor muito pequeno pode fazer com que o robô se perca facilmente em áreas abertas.

    # É uma forma de rejeição de outliers (leituras anômalas) e funciona apenas no modo likelihood_field. Os feixes ignorados não são usados ​​no cálculo da probabilidade da observação dado o mapa p(z|m), que é usado como peso de cada partícula. Portanto, as partículas corretas não têm seu peso reduzido devido a obstáculos inesperados.
    # O objetivo deste mecanismo é lidar com obstáculos dinâmicos não mapeados (como uma pessoa andando na frente do robô) ou leituras de sensor espúrias (como reflexos).
    # O Conceito -> Consenso das Partículas: Para cada feixe do laser, o AMCL primeiro verifica o que a maioria das partículas espera ver naquela direção. Ele faz um raycasting a partir da pose de cada partícula para encontrar a distância esperada até um obstáculo no mapa.
    #   * Comparação: Ele então compara a medição real do laser (d_medida) com a distribuição de distâncias esperadas pela nuvem de partículas.
    #   * Decisão de Pular: Se a medição real do laser for muito diferente do que a maioria das partículas esperava, esse feixe é considerado um outlier (uma anomalia) e é ignorado (pulado) durante o cálculo do peso das partículas.
    # A ideia é: "Se 95% das minhas hipóteses (partículas) dizem que deveria haver uma parede a 5 metros, mas o laser mediu 1 metro, essa medição de 1 metro provavelmente é uma pessoa na frente do robô e não deve ser usada para corrigir minha pose, pois me puxaria para longe da parede real.
    do_beamskip: false  # [bool, default: false] true para ativar este mecanismo de rejeição de outliers.
    beam_skip_distance: 1.0 # [double, default: 0.5]  este parâmetro define a distância máxima entre a medição real e a medição esperada pelo consenso das partículas para que um feixe seja considerado "em acordo". Se a diferença for maior que beam_skip_distance, o feixe é um candidato a ser pulado.
    # Exemplo: Se o consenso das partículas espera uma parede a 5.0m e beam_skip_distance é 0.5m, uma medição real entre 4.5m e 5.5m é considerada "em acordo". Uma medição de 2.0m "discorda".
    
    beam_skip_error_threshold: 0.95  # [double, default: 0.9] Este é o mecanismo de segurança global. Após a primeira passagem (onde os feixes que discordam são pulados), o AMCL calcula o peso das partículas usando os feixes restantes. Se, mesmo com os feixes "bons", a confiança geral ainda for baixa (indicando má convergência), este parâmetro entra em ação.
    # Comportamento: Se a porcentagem de feixes que não correspondem ao mapa (mesmo após o "skip") exceder beam_skip_error_threshold, o AMCL descarta o resultado e força uma atualização completa usando TODOS os feixes originais, ignorando o mecanismo de "beam skip" para esta atualização.
    # Intuição: "Eu tentei ser inteligente e ignorar os outliers, mas o resultado ainda foi ruim. Minha suposição sobre o que era um outlier estava provavelmente errada. Vou tentar de novo, desta vez usando toda a informação que tenho."


    beam_skip_threshold: 0.3  # [double, default: 0.3] define a porcentagem mínima de partículas que devem concordar sobre a distância esperada para que o mecanismo de "beam skip" seja acionado para aquele feixe.
    # Exemplo: Se beam_skip_threshold é 0.3 (ou seja, 30%), o AMCL só tentará pular um feixe se pelo menos 30% de todas as partículas concordarem sobre qual deveria ser a distância medida. Se a própria nuvem de partículas estiver muito dispersa (baixa confiança), este limiar não será atingido, e o feixe não será pulado, como uma medida de segurança.
    

    # -------- Parâmetros de Ponderação (para avaliar a probabilidade de usar aquele feixe de laser nos calculos) --------
    # O metodo beam usa z_hit, z_rand, z_max e z_short. A probabilidade final de uma única medição z (método beam) é uma soma ponderada:  p(z) = z_hit * p_hit(z) + z_short * p_short(z) + z_max * p_max(z) + z_rand * p_rand(z)
    # O metodo likelihood_field usa apenas z_hit e z_rand.  Prob_final = z_hit * Prob_hit + z_rand * Prob_rand
    z_hit: 0.95    # [double, default: 0.5] para likelihood: é o peso ou a importância dada à probabilidade calculada pelo campo de verossimilhança (o "acerto" ou "hit"). Para Beam: Representa a probabilidade de que uma leitura de laser tenha de fato atingido um obstáculo que está no mapa
    # Intuição: Ele faz parte de um modelo misto. A probabilidade final de uma leitura de feixe do laser é uma combinação ponderada da probabilidade de ser um "acerto" (calculada com sigma_hit) e a probabilidade de ser uma "leitura aleatória" (z_rand).
    # Ajuste: Um valor alto (próximo de 1.0) significa que você confia muito no seu sensor e no seu mapa, e acredita que a maioria das leituras são acertos válidos. Um valor mais baixo dá mais peso à possibilidade de leituras aleatórias e sem sentido. Geralmente, um valor entre 0.8 e 0.95 é um bom ponto de partida.
    # Este é geralmente o maior peso. Se você confia muito no seu sensor e no seu mapa, pode mantê-lo alto (ex: 0.95). Se o seu ambiente tem muitos obstáculos dinâmicos não mapeados, você pode precisar diminuí-lo um pouco para dar mais peso às outras distribuições.

    z_rand: 0.3 #[double, default: 0.5] O peso da distribuição "aleatória" (Rand). Representa a probabilidade de uma leitura ser completamente aleatória e sem sentido, como um reflexo de um espelho, interferência, pessoas passando. Isso é modelado como uma distribuição uniforme em toda a faixa do sensor.
    # Intuição: Representa a chance de o laser detectar algo que não tem nada a ver com o mapa (reflexos, pessoas passando, etc.).
    # Este é o "fator de segurança" do modelo. Um valor pequeno, mas não nulo, garante que o AMCL nunca fique 100% certo de sua pose, o que o ajuda a se recuperar de erros. Se o seu ambiente tem muitas superfícies reflexivas (vidro, metal polido), você pode precisar aumentar este valor 

    z_max: 0.05 #[double, default: 0.05] A probabilidade do feixe não ter capturado nenhum obstáculo e retornado seu alcance máximo, mesmo que no mapa estático houvesse um obstáculo mais perto. Isso é modelado como um pequeno pico de probabilidade na distância máxima do sensor.
    # Este valor geralmente é mantido pequeno. Ele só é relevante se o seu sensor tem uma tendência conhecida de falhar dessa maneira.

    z_short: 0.05 # [double, default: 0.005] Para o modelo Representa a probabilidade de a leitura de um feixe ter sido causada por um obstáculo inesperado (não mapeado) que está mais perto do que o obstáculo no mapa estático. Isso é modelado como uma distribuição exponencial decrescente.
    # Para o modelo beam: É o parâmetro da distribuição exponencial usada para modelar os "acertos curtos" (p_short).
    # Se o seu ambiente é muito dinâmico, com muitos objetos se movendo, aumentar um pouco este valor pode ajudar o AMCL a não descartar poses que parecem "ruins" apenas porque um obstáculo temporário apareceu.
    

    # ----- Parâmetros de Forma das Distribuições (Usam o Campo para Avaliar as Partículas) -----
    # Estes parâmetros controlam a forma matemática de cada uma das distribuições de probabilidade.
    sigma_hit: 0.1    # [double, default: 0.2] O Controlador da "Precisão do Acerto" (z_hit). Este parâmetro é usado em ambos os modelos (likelihood_field e beam), mas seu papel é o mesmo: ele define o ruído esperado do sensor para um "acerto" (hit) válido.
    # É o desvio padrão (σ) de uma distribuição Gaussiana (a curva em forma de sino).
    # A probabilidade de um "acerto" é calculada com base na diferença entre a distância medida pelo laser (d_medida) и a distância esperada do mapa (d_esperada). -> Prob_hit ~ exp( - (d_medida - d_esperada)² / (2 * sigma_hit²) )
    # Valor menor (ex: 0.1): Cria uma curva Gaussiana "pontuda". Isso significa que o AMCL será muito exigente. Apenas as leituras de feixe laser que caem muito perto de um obstáculo no mapa receberão uma alta probabilidade. Isso leva a uma localização mais precisa, mas também torna o filtro mais "frágil" e suscetível a se perder se o mapa ou os sensores não forem perfeitos.
    # Valor maior (ex: 0.5): Cria uma curva Gaussiana "larga". O AMCL será mais tolerante. Leituras de laser que caem um pouco longe de um obstáculo ainda receberão uma probabilidade razoável. Isso torna a localização mais robusta e menos propensa a se perder, mas pode resultar em uma pose estimada um pouco menos precisa (a nuvem de partículas será mais dispersa).

    lambda_short: 0.1   # [double, default: 0.1] (usado apenas no modelo beam) lambda_short (λ) é o parâmetro de uma distribuição exponencial. Esta distribuição modela a probabilidade de um feixe de laser ter atingido um obstáculo inesperado (não mapeado), como uma pessoa ou uma cadeira, que está mais perto do que a parede mapeada.
    # A probabilidade de um "acerto curto" (p_short) é alta para distâncias medidas muito pequenas e decai exponencialmente à medida que a distância medida aumenta. -> p_short ~ lambda_short * exp( -lambda_short * d_medida )
    # lambda_short PEQUENO (ex: 0.05): Curva Exponencial Decai lentamente.
    #   * Comportamento do AMCL: O algoritmo considera que é razoavelmente provável encontrar um obstáculo inesperado a uma distância considerável. Ele não penaliza tanto as leituras "curtas".
    #   * Quando usar: Pode ser útil se você espera obstáculos dinâmicos a grandes ou se o seu sensor é propenso a leituras curtas espúrias.
    # lambda_short GRANDE (ex: 0.5): Curva Exponencial Decai rapidamente.
    #   * Comportamento do AMCL: O algoritmo acredita que os obstáculos inesperados geralmente estão muito, muito perto do robô. Uma leitura "curta" a 2 metros de distância, quando a parede está a 5 metros, será considerada muito improvável de ser um obstáculo dinâmico.
    #   * Quando usar: Este é o cenário mais comum. Geralmente, assume-se que os obstáculos dinâmicos são detectados quando estão próximos.
    
    # --- Parâmetros do Filtro de Partículas ---
    max_particles: 2000                    # [int, default: 2000] Número máximo de partículas (hipóteses de pose).
    min_particles: 800                     # [int, default: 500] Número mínimo de partículas.
    resample_interval: 1                   # [int, default: 1] Número de atualizações do filtro antes de reamostrar as partículas.
    update_min_a: 0.017                     # [double, default: 0.2] Rotação mínima (radianos) para acionar uma atualização do filtro.
    update_min_d: 0.01                     # [double, default: 0.25] Translação mínima (metros) para acionar uma atualização do filtro.
    
    # --- Outros ---
    tf_broadcast: true                     # [bool, default: true] Se o AMCL deve publicar a transformada de 'map' para 'odom'. Essencial para o sistema funcionar.
    transform_tolerance: 0.8               # [double, default: 0.1] Tolerância de tempo para transformadas. "TF2, por favor, me dê a transformada entre odom e base_footprint para o timestamp exato de 12345.6789 segundos."

    
    # filtro de recuperação de falha de localização
    # O AMCL usa o "peso médio" de todas as suas partículas como um indicador de quão bem a nuvem de partículas atual corresponde às leituras do sensor.
    #   * Peso médio alto: As partículas estão bem agrupadas em uma pose que "explica" bem as leituras do sensor. O AMCL está confiante.
    #   * Peso médio baixo: Nenhuma das partículas (hipóteses de pose) consegue explicar bem as leituras do sensor. Isso sugere que a pose real do robô provavelmente está longe de qualquer uma das partículas. O AMCL está "perdido".
    # o AMCL mantém duas médias móveis exponenciais do peso médio das partículas, em vez de apenas uma:
    #   * Média de Longo Prazo (w_slow): Uma média que se move muito lentamente e representa a qualidade geral da localização ao longo do tempo. age como a "memória" de longo prazo do filtro
    #   * Média de Curto Prazo (w_fast): Uma média que se move rapidamente e reflete a qualidade da localização nas últimas poucas atualizações. age como a "memória" de curto prazo do filtro
    # O mecanismo de recuperação é acionado quando a qualidade da localização de curto prazo é muito pior do que a qualidade de longo prazo. A lógica é: "Eu costumava estar bem localizado (w_slow está alto), mas agora estou muito mal localizado (w_fast está baixo). Portanto, eu provavelmente fui 'sequestrado' ou me perdi."
    # Quando esta condição é verdadeira, o AMCL começa a adicionar partículas aleatórias em todo o mapa a cada atualização.
    recovery_alpha_slow: 0.0               # [double, default: 0.0] 
    recovery_alpha_fast: 0.0               # [double, default: 0.0]
    
    # --- Pose Inicial ---
    always_reset_initial_pose: false       # [bool, default: false] Se definido como true, toda vez que o nó AMCL transitar do estado inactive para o estado active, ele descartará sua localização atual e se reinicializará na pose especificada pelos parâmetros initial_pose.
    
    first_map_only: false                  # [bool, default: false] Se definido como true, o AMCL (espalhamento da nuvem de particulas) se inicializará com o primeiro mapa que receber no tópico /map, mas ignorará todos os mapas subsequentes que forem publicados nesse mesmo tópico.
    # false: Por algum motivo (ex: o robô se move para um andar diferente, ou um operador carrega um novo mapa), o map_server (ou outro nó) publica um novo mapa, mapa_B.yaml, no mesmo tópico /map. Como first_map_only é false, o AMCL detecta a chegada de um novo mapa. Ele interpreta isso como uma mudança fundamental no ambiente.
    # O AMCL se reinicializa completamente. Ele descarta sua localização atual, descarta o mapa_A, e reinicializa seu filtro de partículas do zero dentro do novo mapa_B (geralmente na initial_pose se set_initial_pose for true).

    set_initial_pose: true                 # [bool, default: false] Se true, usa os valores de 'initial_pose' abaixo para inicializar o filtro.
    initial_pose:                          # [struct] A pose inicial (x, y, yaw) para o filtro de partículas.
      x: -31.597925
      y: 9.167661
      z: 0.0
      yaw: -1.7000761
      # x: -30.389490
      # y: 5.822581
      # z: 0.0
      # yaw: -2.1    # -2.1   3.0
      # x: 10.957655906677246   # -30.389490
      # y: 1.3515340089797974   # 5.822581
      # z: 0.0
      # yaw: 1.2     # -2.1   3.0
    
    # controla o nível de informação que os serviços e ações do nó fornecem sobre seu estado interno.
    # O ROS 2 introduziu um conceito poderoso chamado "Introspecção de Serviço/Ação", que permite que um cliente (como uma ferramenta de linha de comando ou um painel de controle) obtenha informações detalhadas sobre o estado de um servidor sem ter que se inscrever em múltiplos tópicos.
    introspection_mode: "disabled"      # [string, default: disabled]  
    # 1."disabled" (Padrão): Funcionalidade: Este é o modo de operação normal e mais eficiente.
    #   * Comportamento: Os serviços e ações do AMCL (como o serviço para solicitar a reinicialização do filtro) se comportam de forma padrão. Eles aceitam requisições e retornam respostas, mas não fornecem nenhuma informação extra sobre o estado interno do nó.
    # 2."metadata": Funcionalidade: Modo de depuração de nível médio.
    #   * Comportamento: Quando este modo está ativo, os servidores de serviço e ação do AMCL anexam metadados às suas respostas. Esses metadados podem incluir informações como:
    #       * O timestamp de quando a requisição foi recebida.
    #       * O tempo que o servidor levou para processar a requisição.
    #       * O ID do cliente que fez a chamada.
    # 3."contents" Funcionalidade: Modo de depuração de mais alto nível.
    #   * Comportamento: Este modo inclui todos os "metadata" e, adicionalmente, anexa o conteúdo do estado interno do servidor à resposta. Para o AMCL, isso poderia significar que uma chamada de serviço poderia retornar, junto com sua resposta normal, uma "cópia" da nuvem de partículas atual ou o estado do modelo de sensor no momento da chamada.
    #       * Caso de Uso: Este é o modo mais poderoso para depuração, pois permite que uma ferramenta externa "tire uma foto" do estado exato do AMCL em um momento específico, sem a necessidade de configurar e sincronizar a assinatura de múltiplos tópicos de depuração. É o sucessor espiritual da publicação de tópicos de introspecção.

    save_pose_rate: -1.0  # [double, default: 0.5] Define a frequência (em segundos) com que o AMCL salvará sua última pose estimada em um arquivo. Um valor negativo (como o padrão -1.0) desativa completamente este recurso.
    
    # A Probabilidade de um Erro de Propagação, estão ligados ao modelo de sensor beam, mas podem ter uma influência residual em outros cálculos.
    # Pense no AMCL como um ciclo de duas etapas:
    #   1.Previsão (Prediction): O AMCL usa a odometria para mover todas as partículas para onde elas deveriam estar. (w_slow = w_slow + recovery_alpha_slow * (peso_medio_atual - w_slow))
    #   2.Atualização (Update): O AMCL usa a leitura do laser para avaliar o quão "boas" são as novas posições das partículas e recalcula seus pesos.
    pf_err: 0.01    # [double, default: 0.05] Este parâmetro representa a probabilidade intrínseca de que o modelo de movimento do robô esteja completamente errado. O pf_err entra na etapa de Previsão. Ele introduz uma pequena, mas constante, chance de que a odometria esteja tão errada que a partícula poderia, na verdade, estar em qualquer outro lugar.
    # Como é usado? Ele é combinado com a probabilidade calculada pelo modelo de movimento. A ideia é que, mesmo que o modelo de movimento diga que é 100% provável que a partícula tenha se movido de A para B, o pf_err adiciona uma "cauda" uniforme à distribuição, dizendo que há uma pequena chance (pf_err) de ela ter ido para um lugar completamente aleatório.
    # Efeito Prático: É um mecanismo de regularização. Ele age de forma semelhante ao z_rand (no modelo de sensor), mas no lado do modelo de movimento. Ele impede que o filtro fique excessivamente confiante em sua odometria. Ao garantir que sempre haja uma minúscula probabilidade de a partícula estar em outro lugar, ele ajuda o filtro a não descartar completamente regiões do mapa que poderiam se tornar relevantes se a odometria falhar catastroficamente.
    # Ajuste: Este é um parâmetro de ajuste fino. O valor padrão (0.05) é geralmente seguro. Aumentá-lo significa que você confia menos na sua odometria. Diminuí-lo significa que você confia mais. Na prática, é muito mais eficaz e intuitivo ajustar os parâmetros alpha do modelo de movimento do que mexer no pf_err.
    pf_z: 0.99      # [double, default: 0.99] A Influência do Erro de Medição. Este parâmetro é um fator de ponderação que mistura a probabilidade calculada pelo modelo de sensor com uma distribuição uniforme. Ele está diretamente ligado ao pf_err. Este parâmetro atua na etapa de Atualização, quando os pesos das partículas são calculados a partir das leituras do laser.
    # O peso final de uma partícula não é apenas a probabilidade calculada pelo modelo de sensor (p_sensor). Ele é misturado com uma distribuição uniforme usando pf_z e pf_err. A fórmula conceitual é algo como: Peso_final = pf_z * p_sensor + pf_err * (1 / N). Onde N é o número de locais possíveis.
    # Efeito Prático: 
    #   * Se pf_z for 1.0, o peso da partícula é determinado inteiramente pela leitura do sensor.
    #   * Se pf_z for menor que 1.0 (ex: o padrão 0.99), ele "rouba" um pouco da influência do sensor e a redistribui uniformemente, como um "imposto de incerteza".
    #   * Ele funciona em conjunto com pf_err para garantir que nenhuma partícula receba um peso de exatamente zero, o que poderia levar ao colapso do filtro se todas as partículas acabassem em locais ruins.
    # Ajuste: Assim como o pf_err, este é um parâmetro de baixo nível. Manter em 0.99 é quase sempre a melhor abordagem. Reduzir este valor significa que você está diminuindo artificialmente a confiança nas suas medições de sensor, o que raramente é desejável. É mais eficaz ajustar os parâmetros do próprio modelo de sensor (como sigma_hit e os z_*) para controlar a confiança.
  
planner_server:
  # Função: Servidor responsável por criar um plano global (um caminho) do ponto inicial do robô até o alvo final. 
  # Ele usa o global_costmap para encontrar o caminho mais curto que evita obstáculos conhecidos.
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0       # [double, default: -1.0] Frequência esperada de planejamento. -1.0 para sob demanda.
    planner_plugins: ["GridBased"]         # [vector<string>] Lista de plugins de planejamento disponíveis.
    costmap_update_timeout: 0.5            # [double, default: 0.1] Tempo para esperar por uma atualização do costmap.

    # GridBased:
    #   # Plugin que implementa um planejador global. Aqui, um planejador customizado.
    #   # plugin: "waypoint_global_planner::WaypointGlobalPlanner"
    #   # epsilon: 0.5
    #   # waypoints_per_meter: 20
    #   # Exemplo de alternativa comum:
    #   plugin: "nav2_navfn_planner::NavfnPlanner" # [string] Implementa o algoritmo A* ou Dijkstra.
    #   tolerance: 0.5                           # [double] Tolerância para o planejador.
    #   use_astar: false                         # [bool] Se false, usa Dijkstra. Se true, usa A*.
    
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: false

