#         scale: 10.0         # (Defalt: 1.0) Peso final dessa crítica na soma total do DWB.
#         slowing_factor: 5.0   # (Defalt: 5.0)  Quanto penalizar translação residual na fase de desaceleração. Ele multiplica a penalização de velocidade translacional residual perto do goal.
