smoother_server:
  ros__parameters:
    smoother_plugins: ["savitzky_golay_smoother"]
    savitzky_golay_smoother:
      plugin: "nav2_smoother::SavitzkyGolaySmoother"
      do_refinement: true 
      keep_start_orientation: true

behavior_server:
  # Função: Servidor que executa comportamentos de recuperação de falhas. Quando o bt_navigator detecta que a navegação falhou (ex: o robô está preso), 
  # ele pode chamar este servidor para executar uma ação como "girar no lugar" (spin) ou "dar ré" (backup) para tentar se livrar do problema.
  ros__parameters:
    # --- Frequência e Tópicos ---
    cycle_frequency: 10.0                # [double, default: 10.0] Frequência de execução do servidor.
    local_costmap_topic: local_costmap/costmap_raw # [string]
    global_costmap_topic: global_costmap/costmap_raw # [string]
    local_footprint_topic: local_costmap/published_footprint # [string]
    global_footprint_topic: global_costmap/published_footprint # [string]

    # --- Seleção de Plugins de Comportamento ---
    behavior_plugins: ["backup", "drive_on_heading", "assisted_teleop", "wait"] # [vector<string>] Lista de comportamentos disponíveis.
    backup:
      plugin: "nav2_behaviors::BackUp"     # [string] Move o robô para trás por uma distância fixa.
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading" # [string] Move o robô em uma direção específica.
    wait:
      plugin: "nav2_behaviors::Wait"       # [string] Para o robô por um tempo.
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop" # [string] Permite teleoperação que evita obstáculos.

    # --- Parâmetros Gerais de Comportamento ---
    local_frame: odom                      # [string, default: "odom"]
    global_frame: map                      # [string, default: "map"]
    robot_base_frame: base_footprint       # [string, default: "base_link"]
    transform_tolerance: 0.3               # [double, default: 0.1]
    simulate_ahead_time: 2.0               # [double, default: 2.0] Tempo para simular à frente para verificação de colisão.
    max_rotational_vel: 0.1                # [double, default: 1.0] Velocidade rotacional máxima para os comportamentos.
    min_rotational_vel: 0.06                # [double, default: 0.4]
    rotational_acc_lim: 0.3                # [double, default: 3.2]
    enable_stamped_cmd_vel: false          # [bool, default: false]


robot_state_publisher:
  # Função: Lê o estado das juntas do robô (do tópico /joint_states) 
  # e a descrição do robô (URDF, do tópico /robot_description) e calcula e 
  # publica as transformadas (TF2) entre todos os links do robô (ex: de base_link para wheel_link).
  ros__parameters:
    use_sim_time: false                  # [bool, default: false]

waypoint_follower:
  # Função: Permite que o robô siga uma sequência de waypoints (pontos de passagem), chamando a ação navigate_to_pose para cada um deles.
  ros__parameters:
    use_sim_time: false
    loop_rate: 10                        # [int, default: 20] Frequência em Hz do loop principal.
    stop_on_failure: false               # [bool, default: true] Se deve parar tudo se a navegação para um waypoint falhar.
    waypoint_task_executor_plugin: "wait_at_waypoint" # [string] Plugin para executar uma tarefa em cada waypoint.
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint" # [string] Plugin que faz o robô esperar em um waypoint.
      enabled: True                      # [bool, default: true]
      waypoint_pause_duration: 200       # [int, default: 0] Tempo em segundos para pausar em cada waypoint.


velocity_smoother:
  # Função: Atua como um intermediário entre os comandos de velocidade gerados pelo controlador e o driver do robô. 
  # Ele garante que os comandos de velocidade respeitem os limites de aceleração e desaceleração do robô, resultando em um movimento mais suave e seguro.
  ros__parameters:
    smoothing_frequency: 20.0            # [double, default: 20.0] Frequência de operação.
    scale_velocities: false              #  (bool, default: false) Se um limite de aceleração é atingido em um eixo (ex: vx), este parâmetro decide como tratar os outros eixos (vtheta).
    # false (padrão): Apenas o eixo que violou o limite é "cortado". Os outros eixos mantêm seus valores.
    # true: Todos os eixos são escalados proporcionalmente. Se vx precisa ser reduzido em 20%, vtheta também será reduzido em 20%. Isso tenta manter a "direção" do comando original, mesmo que signifique desviar ligeiramente da trajetória.
   
    feedback: "OPEN_LOOP"                #  (string, default: "OPEN_LOOP") Define a fonte para a "velocidade atual" do robô.
    # "OPEN_LOOP": Assume que a velocidade atual é o último comando que ele enviou. É uma boa aproximação se os limites de aceleração estiverem bem configurados.
    # "CLOSED_LOOP": Usa a odometria real do robô (do odom_topic) para saber a velocidade atual. Requer uma odometria de alta frequência e baixa latência.
    
    # --- Limites Cinemáticos ---
    max_velocity: [0.5, 0.0, 0.5]       # (vector<double>, default: [0.5, 0.0, 2.5]) Velocidades máximas [vx, vy, vtheta] em m/s e rad/s.
    min_velocity: [0.0, 0.0, -0.5]    # (vector<double>, default: [-0.5, 0.0, -2.5]) Velocidades mínimas (negativas para ré). A documentação corretamente aponta que a velocidade angular negativa (-vtheta) corresponde a uma curva para a direita.
    max_accel: [0.15, 0.0, 0.2]           # (vector<double>, default: [2.5, 0.0, 3.2]) Acelerações máximas [ax, ay, atheta] em m/s² e rad/s².
    max_decel: [-0.25, 0.0, -0.9]         # (vector<double>, default: [-2.5, 0.0, -3.2]) Desacelerações máximas (devem ser negativas).

    # --- Tópicos e Timeouts ---
    odom_topic: "/odom"                  # [string, default: "odom"]
    odom_duration: 0.1                   # (double, default: 0.1 s) Janela de tempo para calcular a velocidade a partir das mensagens de odometria no modo CLOSED_LOOP.
    velocity_timeout: 1.0                # (double, default: 1.0 s) "Disjuntor de segurança". Se nenhum novo comando for recebido neste período, ele para o robô publicando um comando de velocidade zero.
    
    deadband_velocity: [0.015, 0.0, 0.06]   # (vector<double>, default: [0.0, 0.0, 0.0]) A "zona morta". Comandos de velocidade com valor absoluto menor que estes serão tratados como zero. Isso evita enviar comandos "residuais" para o hardware que poderiam causar ruído ou superaquecimento dos motores ao tentar atingir uma velocidade impossível (stall torque).
    enable_stamped_cmd_vel: false        # (bool, default: true a partir do Kilted, false no Jazzy e anteriores) Define o tipo de mensagem de saída.
    # * true: Publica geometry_msgs/msg/TwistStamped (com timestamp).
    # * false: Publica geometry_msgs/msg/Twist (sem timestamp).
    # Nota Importante: A documentação destaca uma mudança crucial entre as versões do ROS 2. No Jazzy, o padrão é false. Em versões mais novas, o padrão é true. É importante garantir que o seu driver de robô espera o tipo de mensagem correto.

    bond_heartbeat_period: 0.1  # (double, default: 0.1 s) Período do "heartbeat" do mecanismo de bond do ciclo de vida, que verifica se o nó ainda está vivo. 0.0 ou menos desativa.

collision_monitor:
  ros__parameters:
    enabled: True
    base_frame_id: "base_footprint"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    source_timeout: 5.0
    base_shift_correction: True
    stop_pub_timeout: 2.0
    enable_stamped_cmd_vel: False
    use_realtime_priority: false

    polygons: ["PolygonStop"]

    PolygonStop:
      type: "polygon"
      action_type: "stop"
      enabled: True
      visualize: True
      polygon_pub_topic: "polygon_stop"

      # Retângulo de colisão a frente
      points: "[[0.85, -0.35], [1.05, -0.35], [1.05,  0.35], [0.85,  0.35]]"

    observation_sources: ["scan"]
    scan:
      source_timeout: 0.2
      type: "scan"
      topic: "/scan"
      enabled: True
