#         # lookahead_time >= 0: projeta pose no tempo t e usa o yaw dessa pose. lookahead_time pequeno positivo (ex. 0.1–0.3): avalia yaw “mais cedo”, resposta mais imediata. Maior: olha mais para o futuro dentro da trajetória; pode suavizar ou atrasar reação.
#         # Intuição prática de tuning
#         #   * Robô chega rápido mas passa reto no fim: aumente RotateToGoal.scale e/ou slowing_factor.
#         #   * Robô “trava” cedo demais: reduza slowing_factor ou ajuste trans_stopped_velocity.
#         #   * Robô oscila no yaw final: teste lookahead_time pequeno positivo (ex. 0.1~0.3) e ajuste com GoalAlign.

#       # A Oscillation é um critic stateful que bloqueia comandos de vai-e-volta repetitivos (jitter), em x, y e theta.
#       # Se detecta troca de sinal frequente (ex.: +x, depois -x, depois tenta +x de novo sem “reset”), considera os novos comandos como oscilação e invalida trajetórias que repetem esse padrão.
#       Oscillation:
#         scale: 1.0    # (Defalt: ) 
#         oscillation_reset_dist: 0.05    # (Defalt: 0.05)  distância mínima para liberar restrições.
#         oscillation_reset_angle: 0.17    # (Defalt: 0.2)  rotação mínima para liberar restrições.
#         oscillation_reset_time: -1.0    # (Defalt: -1.0) tempo mínimo para liberar; <0 desabilita reset por tempo.
#         x_only_threshold: 0.05    # (Defalt: 0.05) só monitora oscilação de y e theta quando |x| <= threshold. ideia: se está andando pra frente de fato, não penalizar tanto strafing/rotação.
#         # Intuição de tuning
#         #   * Oscila muito (frente-trás / gira-esquerda-direita): aumente oscillation_reset_dist ou oscillation_reset_time.
#         #   * Está “travando” e demorando a liberar manobras: reduza oscillation_reset_dist/angle/time.
#         #   * Para diferencial puro, x_only_threshold pequeno ajuda a focar em oscilação real durante baixa translação.

#       # Ela verifica, para cada pose da trajetória, se o footprint orientado do robô (polígono) encosta em célula letal/desconhecida na costmap. Se encostar, a trajetória é inválida.
#       ObstacleFootprint:
#         scale: 20.0       #  (Defalt: 1.0)  Peso no total da função custo.
#         sum_scores: true #  (Defalt: false) false: usa essencialmente score da última pose. true: soma scores de todas as poses da trajetória.
      
#       # Cria um campo de distância (Manhattan na grade) até o último ponto do plano que está no costmap local. Incentiva progresso até o fim do trecho local do plano.
#       # Quanto menor a distância desse campo no fim da trajetória local (mapa local), menor é o custo
#       # cada célula do mapa de custo guarda “quão longe” ela está da do destino final local (ultimo ponto da rota globla dentro do mapa local).     
#       GoalDist:
#         scale: 1.0    #  (Defalt: 1.0) Se aumentar GoalDist.scale, o robô prioriza mais “chegar perto do fim do plano local”.
#         aggregation_type: "last"   #  (Defalt: last) Como combinar o score das várias poses da trajetória.

#       # GoalAlign é a crítica que tenta fazer o robô apontar na direção correta para o objetivo (especialmente no trecho final), usando a “frente” do robô (forward_point_distance)
#       # Ela herda de GoalDist, mas com um truque de alinhamento:
#       #   1. Define um ponto à frente do robô (forward_point_distance).
#       #   2. Em vez de pontuar o centro do robô, ela pontua esse ponto “nariz”.
#       #   3. Também ajusta o alvo final no prepare() para evitar instabilidade perto do goal (principalmente giros de 180 graus).
#       GoalAlign:
#         forward_point_distance: 0.325 #  (Defalt: 0.325)  Distância do ponto à frente usado para pontuar alinhamento. Maior valor: critic fica mais exigente com orientação. Valor muito alto pode deixar comportamento nervoso em espaços apertados.
#         scale: 1.0     #  (Defalt: 1.0) 
#         aggregation_type: last   #  (Defalt: last) 
#         # last (padrão): Usa o score da última pose da trajetória.
#         #   * Foco: “onde essa trajetória termina”.
#         # sum: Soma score de todas as poses.
#         #   * Foco: “qualidade do percurso inteiro”. Penaliza trajetórias que passam muito tempo longe do alvo/path, mesmo que terminem bem.
#         # product: Multiplica scores das poses (quando score acumulado > 0).
#         #   * Fica muito sensível a valores altos e zero; geralmente menos intuitivo para tuning.


#       # PathDist é uma crítica de aderência ao caminho global: ela mede quão longe a trajetória candidata fica do path, usando um campo de distância em grade.
#       # pergunta: “o robô está perto do path?”
#       PathDist:
#         scale: 50.0  #  (Defalt: 1.0) Se PathDist.scale estiver alto, ela domina a decisão e reduz desvios laterais. Se estiver baixo, outras críticas (obstáculo, goal, rotação etc.) podem permitir atalhos.
#         aggregation_type: "last"       #  (Defalt: last) 
      
#       # Alinha o “nariz” do robô com o traçado do caminho.
#       # A PathAlign tenta manter a frente do robô (não o centro) alinhada com o caminho global local.
#       # Ela herda de PathDist, então usa campo de distância em grade até o path, mas pontuando um ponto à frente do robô (forward_point_distance).
#       # PathAlign desliga o efeito perto do goal para evitar instabilidade
#       # pergunta: “a frente do robô está apontando para seguir o path?”
#       PathAlign:
#         scale: 1.0    #  (Defalt: 1.0)  Maior -> robô privilegia mais alinhamento do nariz ao path.
#         forward_point_distance: 0.325 #  (Defalt: 0.325)  Maior -> mais exigente com orientação; pode ficar nervoso se exagerar.
#         aggregation_type: last       #  (Defalt: last) 

      
controller_server:
  # Função: Servidor responsável por seguir um caminho (plano). 
  # Ele recebe um caminho do planner_server (via BT Navigator) e gera comandos de velocidade (/cmd_vel) para o robô, 
  # usando um plugin de controlador local.
  ros__parameters:
    # controller server parameters (see Controller Server for more info)
    controller_frequency: 15.0
    # --- Limites Mínimos de Velocidade ---
    # * Ruído do Sensor: A odometria do robô (geralmente de encoders de roda) pode ter um pequeno ruído. Mesmo que o robô esteja perfeitamente parado, a odometria pode reportar uma velocidade minúscula, como 0.0001 m/s.
    # * Comandos do Controlador: Um controlador local, ao tentar fazer um ajuste muito fino, pode gerar um comando de velocidade extremamente pequeno, como 0.0005 m/s. Essa velocidade é tão baixa que, na prática, os motores do robô nem conseguiriam superar a inércia e o atrito para executá-la.
    # Se o progress_checker simplesmente verificasse se velocidade > 0, ele poderia ser enganado por esses valores minúsculos e pensar que o robô está "progredindo", mesmo que na prática ele esteja parado.
    min_x_velocity_threshold: 0.015      # [double, default: 0.001] Limiar para velocidade linear em X.
    min_y_velocity_threshold: 0.5        # [double, default: 0.001] Limiar para velocidade linear em Y (para robôs omnidirecionais).
    min_theta_velocity_threshold: 0.05  # [double, default: 0.001] Limiar para velocidade angular.


    progress_checker_plugins: ["progress_checker"] # Lista dos checkers que validam se o robô está fazendo progresso (não travado)
    goal_checker_plugins: ["goal_checker"]  # Lista dos checkers que decidem quando o goal foi alcançado (tolerâncias de posição/orientação). 
    
    # --- Configuração do Plugin `progress_checker` ---
    progress_checker:
      # "O robô se moveu uma distância mínima (required_movement_radius) dentro de um tempo máximo permitido (movement_time_allowance)?"
      # Se a resposta for "não", o ProgressChecker declara uma falha, o que geralmente faz com que o controller_server pare e o bt_navigator tente um comportamento de recuperação (como girar ou dar ré)
      plugin: "nav2_controller::SimpleProgressChecker" # [string] Plugin que verifica se o robô se moveu uma certa distância em um certo tempo.
      required_movement_radius: 0.05      # [double, default: 0.5] O robô deve se mover pelo menos este raio (em metros) para ser considerado como "progredindo". Se a distância for menor que o raio, o progresso não foi feito, e o cronômetro (movement_time_allowance) continua correndo.
      movement_time_allowance: 1000000000.0       # [double, default: 10.0] Tempo máximo em segundos que o robô pode ficar sem progredir antes de acionar uma falha. **Valor alto para desativar efetivamente esta verificação.**

    # --- Configuração do Plugin `goal_checker` ---
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker" # [string] Plugin que verifica se a pose do robô está dentro de uma tolerância do alvo.
      xy_goal_tolerance: 0.05              # [double, default: 0.25] Tolerância de distância (em metros) para considerar que o alvo foi alcançado.
      yaw_goal_tolerance: 0.1             # [double, default: 0.25] Tolerância de ângulo (em radianos) para considerar que a orientação final foi alcançada.
      stateful: True                       # (bool, default: true) Quando true, uma vez que o robô entra na tolerância XY do alvo, ele "trava" nesse estado e se concentra apenas em atingir a orientação final, sem tentar corrigir novamente a posição XY. Isso evita oscilações no final do percurso. 

    speed_limit_topic: /speed_limit

    FollowPath: #Lista dos controladores locais disponíveis
      # plugin: "dwb_core::DWBLocalPlanner"
      # rotation shim controller (para executar o giro no eixo)
      # plugin: "nav2_rotation_shim_controller::RotationShimController"
      # angular_dist_threshold: 0.785
      # forward_sampling_distance: 1.0  #Forward distance, in meters, along path to select a sampling point to use to approximate path heading
      # rotate_to_heading_angular_vel: 0.6
      # max_angular_accel: 0.8
      # simulate_ahead_time: 0.2 #Time in seconds to forward simulate a rotation command to check for collisions. If a collision is found, forwards control back to the primary controller plugin.
      # rotate_to_goal_heading: true
      # use_path_orientations: false
      # closed_loop: false
      # primary_controller: "nav2_regulated_pure_pursuit_controller::CustomRegulatedPurePursuitController" #Internal controller plugin to use for actual control behavior after rotating to heading
      plugin: "nav2_regulated_pure_pursuit_controller::CustomRegulatedPurePursuitController"
      # parametros do rpp
      # --- VELOCIDADES ---
      desired_linear_vel: 0.7              # [double] Velocidade linear base que o robô tentará atingir em retas.
# 0,6 e 2 m
      # --- LOOKAHEAD (Parâmetro principal do Pure Pursuit) ---
      lookahead_dist: 1.5      #0.9            # (double, default: 0.6 m) Distância à frente do robô para encontrar o "ponto-alvo" a ser perseguido. Um valor maior suaviza o caminho, mas corta mais as quinas.
      use_velocity_scaled_lookahead_dist: true # (bool, default: false) Se true, a distância de lookahead é escalonada com a velocidade do robô (maior velocidade = maior lookahead).
      min_lookahead_dist: 0.5   #0.2           # (double, default: 0.9 m) Distância mínima de lookahead, quando esta usando a velocity scaled lookahead distances (use_velocity_scaled_lookahead_dist).
      max_lookahead_dist: 1.5    #0.8          # (double, default: 1.5 m) Distância máxima de lookahead, quando esta usando a velocity scaled lookahead distances (use_velocity_scaled_lookahead_dist).
      lookahead_time: 1.0                  # (double, default: 1.5 s) O "ganho" para o lookahead adaptativo. A distância de lookahead é calculada como velocidade_atual * lookahead_time. Um valor maior fará com que o lookahead aumente mais rapidamente com a velocidade.

      # --- Parâmetros de Detecção de Colisão (Baseado em Custo) ---
      use_collision_detection: true        # (bool, default: true) Ativa a verificação de colisão. O controlador simula o movimento ao longo do arco e verifica os custos no costmap local.
      min_distance_to_obstacle: 1.0       # (double, default: -1.0 m) A menor distância permitida entre o robô e um obstáculo ao longo de sua trajetória. Defina como <= 0,0 para desativar. Ela é limitada à distância máxima de antecipação selecionada.
      max_allowed_time_to_collision_up_to_carrot: 1.0 # (double, default: 1.0 s) O tempo no futuro para simular o movimento. O controlador projeta a trajetória para frente por este tempo e, se uma colisão for detectada dentro deste horizonte, ele reduzirá a velocidade.

      # --- Parâmetros de Regulação de Velocidade(Comportamento Inteligente) ---
      use_regulated_linear_velocity_scaling: true # (bool, default: true) Ativa a redução de velocidade em curvas fechadas.
      regulated_linear_scaling_min_radius: 4.0    # (double, default: 0.90 m) O raio de curvatura do caminho abaixo do qual a velocidade começa a ser reduzida. Curvas mais fechadas têm raios menores.
      regulated_linear_scaling_min_speed: 0.1    # (double, default: 0.25 m/s) Velocidade mínima a ser usada em curvas muito fechadas.  Deve ser > 0,1.

      # -----Regulação por Proximidade de Obstáculos (Custo)----
      use_cost_regulated_linear_velocity_scaling: true # (bool, default: true) Ativa a redução de velocidade quando o robô está perto de obstáculos (em áreas de alto custo no costmap).
      cost_scaling_dist: 1.0               # (double, default: 0.6 m) A distância de um obstáculo (geralmente dentro da camada de inflação) que aciona a redução de velocidade.
      cost_scaling_gain: 1.0               # (double, default: 1.0) Um multiplicador (<= 1.0) para a velocidade. Quanto menor o valor, mais agressivamente a velocidade é reduzida perto de obstáculos.

      # --- CURVATURA (Avançado) ---
      use_fixed_curvature_lookahead: true  # (bool, default: false) Se true, usa uma distância de lookahead fixa (curvature_lookahead_dist) apenas para o cálculo da curvatura, independentemente da distância de lookahead usada para o controle. Isso pode estabilizar o cálculo da curvatura quando o lookahead de controle é muito variável.
      curvature_lookahead_dist: 1.0        # (double, default: 0.6 m) A distância fixa usada para calcular a curvatura se use_fixed_curvature_lookahead for true.
      interpolate_curvature_after_goal: false # (bool, default: false) Um ajuste fino para evitar oscilações no final do caminho, interpolando um ponto de curvatura extra após o alvo. Requer que use_fixed_curvature_lookahead seja true.


      # ------ Parâmetros de Aproximação ao Alvo-----
      min_approach_linear_velocity: 0.08   # (double, default: 0.05 m/s) Uma velocidade linear mínima garantida ao se aproximar do alvo. Isso evita que o robô pare completamente se a desaceleração for muito agressiva.
      approach_velocity_scaling_dist: 1.0  # (double, default: 0.6 m) A distância do final do caminho na qual o robô começa a desacelerar linearmente da sua velocidade atual até a min_approach_linear_velocity.

      # ----- Parâmetros de Rotação para Alinhamento-----
      use_rotate_to_heading: false          # (bool, default: true) Ativa o comportamento. Se o robô estiver desalinhado com a direção do caminho por um ângulo maior que rotate_to_heading_min_angle, ele irá parar e girar no lugar antes de começar a se mover. Recomendado para todos os robôs que podem girar no lugar.
      rotate_to_heading_angular_vel: 0.6   # (double, default: 1.8 rad/s) A velocidade angular a ser usada durante a manobra de "rotate to heading".
      rotate_to_heading_min_angle: 0.785   # (double, default: 0.785 rad) O ângulo de erro mínimo (em radianos, ~45°) que aciona a manobra de rotação no lugar (quando use_rotate_to_heading = true).
      max_angular_accel: 1.2     #1.5       (double, default: 3.2 rad/s²)  A aceleração angular máxima permitida durante a manobra de rotação.

      # ----- Parâmetros de Cancelamento e Busca----
      use_cancel_deceleration: true  # (bool, default: false) Se true, aplica uma desaceleração controlada quando a navegação é cancelada, em vez de parar abruptamente.
      cancel_deceleration: 1.0  # (double, default: 3.2 m/s²) A desaceleração a ser aplicada se use_cancel_deceleration for true.
      max_robot_pose_search_dist: 4.0     # (double, default: metade da extensão do costmap) Limite superior da distância integrada ao longo do plano global para buscar a pose mais próxima da pose do robô. Este valor deve ser mantido como padrão, a menos que existam caminhos com loops e interseções que não saiam do mapa de custo local, caso em que diminuir esse valor é necessário para evitar atalhos. Se definido como -1, usará a distância máxima possível para buscar em cada ponto do caminho o ponto mais próximo.

      # --- OUTROS ---
      use_path_aware_obstacle_distance: false # Novo parametro para a correcao do obstacle distance com velocity_scaled_lookahead
      allow_reversing: false               # (bool, default: false) Permite que o robô ande de ré. Isso só funciona se o planejador global gerar caminhos que incluam pontos de inflexão (cusps) na orientação. Se false, o robô sempre tentará seguir o caminho para a frente.
      transform_tolerance: 0.1             # [double] Tolerância de tempo (em segundos) para transformadas (TF).
      stateful: true                       # (bool, default: true) Quando true, uma vez que o robô entra na tolerância XY do alvo, ele "trava" nesse estado e se concentra apenas em atingir a orientação final, sem tentar corrigir novamente a posição XY. Isso evita oscilações no final do percurso. 
     
        

