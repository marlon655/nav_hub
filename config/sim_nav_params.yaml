# Parametros Nav2 para testar o simulador usando recursos do pacote nav_hub.
#
# Base executavel: sim_bot/config/oregon_nav_params.yaml
# Referencia Oregon: nav_hub/config/nav_routegraph.yaml
#
# Mantive ativos apenas plugins comuns do Nav2 para nao quebrar a simulacao.
# Partes da Oregon que dependem de pacotes especificos ficaram comentadas com
# "OREGON" para facilitar a comparacao e futura migracao.

bt_navigator:
  ros__parameters:
    use_sim_time: True
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10
    default_server_timeout: 10000
    wait_for_service_timeout: 10000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"

    # OREGON: Behavior Tree de rota por grafo mantida no nav_hub.
    # Requer route:=True, pois chama /compute_route no route_server.
    default_nav_to_pose_bt_xml: "$(find-pkg-share nav_hub)/btree/nav_on_route_graph_oregon.xml"

    error_code_names:
      - compute_path_error_code
      - compute_route_error_code
      - smoother_error_code
      - follow_path_error_code

bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: True

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: True

map_server:
  ros__parameters:
    use_sim_time: True
    frame_id: map
    topic_name: map
    yaml_filename: "$(find-pkg-share nav_hub)/maps/aceleradora.yaml"

amcl:
  ros__parameters:
    use_sim_time: True
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_link
    scan_topic: scan
    map_topic: map

    # Base do simulador, com alguns ajustes da Oregon mantidos como referencia.
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    laser_model_type: "likelihood_field"
    laser_min_range: -1.0
    laser_max_range: 20.0
    max_beams: 100

    # OREGON: usava max_beams: 1000 e laser_likelihood_max_dist: 0.3.
    # Valores altos podem pesar mais no simulador, entao deixei moderado.
    laser_likelihood_max_dist: 2.0
    do_beamskip: false
    beam_skip_distance: 1.0
    beam_skip_error_threshold: 0.95
    beam_skip_threshold: 0.3
    z_hit: 0.95
    z_rand: 0.05
    z_max: 0.05
    z_short: 0.05
    sigma_hit: 0.2
    lambda_short: 0.1

    min_particles: 500
    max_particles: 2000
    pf_err: 0.05
    pf_z: 0.99
    update_min_a: 0.2
    update_min_d: 0.25
    resample_interval: 1
    transform_tolerance: 0.5
    recovery_alpha_slow: 0.0
    recovery_alpha_fast: 0.0
    set_initial_pose: true
    always_reset_initial_pose: false
    first_map_only: false
    save_pose_rate: -1.0

    # PALMARES: pose inicial alinhada ao spawn do Gazebo.
    initial_pose:
      x: 18.34406852722168
      y: 22.93574333190918
      z: 0.0
      yaw: 0.0

    # OREGON: pose inicial usada no mapa real Oregon.
    # initial_pose:
    #   x: -31.597925
    #   y: 9.167661
    #   z: 0.0
    #   yaw: -1.7000761

controller_server:
  ros__parameters:
    use_sim_time: True
    enable_stamped_cmd_vel: false
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05
      yaw_goal_tolerance: 0.1

    FollowPath:
      # OREGON: o robo real usava CustomRegulatedPurePursuitController.
      # No ambiente atual esta disponivel o plugin padrao do Nav2.
      # plugin: "nav2_regulated_pure_pursuit_controller::CustomRegulatedPurePursuitController"
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.7
      lookahead_dist: 1.5
      use_velocity_scaled_lookahead_dist: true
      min_lookahead_dist: 0.5
      max_lookahead_dist: 1.5
      lookahead_time: 1.0
      # Teste RPP padrao: colisao ativa com horizonte menor que o da Oregon.
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      regulated_linear_scaling_min_radius: 4.0
      regulated_linear_scaling_min_speed: 0.1
      use_cost_regulated_linear_velocity_scaling: true
      cost_scaling_dist: 1.0
      cost_scaling_gain: 1.0
      inflation_cost_scaling_factor: 10.0
      use_fixed_curvature_lookahead: true
      curvature_lookahead_dist: 1.0
      interpolate_curvature_after_goal: false
      min_approach_linear_velocity: 0.08
      approach_velocity_scaling_dist: 1.0
      # OREGON usava false no controller custom. No RPP padrao, true ajuda
      # robo diferencial a alinhar antes de seguir o path.
      use_rotate_to_heading: true
      rotate_to_heading_angular_vel: 0.6
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 1.2
      use_cancel_deceleration: true
      cancel_deceleration: 1.0
      max_robot_pose_search_dist: 4.0
      allow_reversing: false
      transform_tolerance: 0.1
      stateful: true

      # OREGON CUSTOM: estes parametros apareciam no arquivo da Oregon, mas
      # nao existem no plugin padrao RegulatedPurePursuitController do Jazzy.
      # min_distance_to_obstacle: 1.0
      # use_path_aware_obstacle_distance: false

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: True
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      # robot_radius: 0.35
      # PALMARES: footprint aproximado do palmares_bot.urdf.xacro.
      # Baseado no corpo 0.533 x 0.460 m com centro em x=-0.0145, y=0.050,
      # incluindo margem lateral das rodas.
      footprint: "[[0.27, -0.22], [0.27, 0.32], [-0.29, 0.32], [-0.29, -0.22]]"

      # OREGON: footprint do robo real. Para usar, remover robot_radius.
      # footprint: "[[0.26, -0.25], [0.26, 0.25], [-0.26, 0.25], [-0.26, 0.085], [-0.54, 0.085], [-0.54, -0.085], [-0.26, -0.085], [-0.26, -0.25]]"
      # OREGON: janela local maior usada no robo real.
      # width: 8
      # height: 8

      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # OREGON: valores importados do nav_routegraph.yaml.
        inflate_unknown: true
        cost_scaling_factor: 10.0
        inflation_radius: 0.3

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 8.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          inf_is_valid: true
          # OREGON: valor importado do nav_routegraph.yaml.

      # OREGON: camada 3D usada com ToF/ground_segmentation.
      # Requer spatio_temporal_voxel_layer e PointCloud2; nao ativar no sim atual.
      # stvl_layer:
      #   plugin: "spatio_temporal_voxel_layer/SpatioTemporalVoxelLayer"
      #   observation_sources: pointcloud
      #   pointcloud:
      #     topic: /ground_segmentation/obstacle_points
      #     data_type: PointCloud2

      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: True
      # robot_radius: 0.35
      # PALMARES: footprint aproximado do palmares_bot.urdf.xacro.
      # Baseado no corpo 0.533 x 0.460 m com centro em x=-0.0145, y=0.050,
      # incluindo margem lateral das rodas.
      footprint: "[[0.27, -0.22], [0.27, 0.32], [-0.29, 0.32], [-0.29, -0.22]]"
      resolution: 0.05
      track_unknown_space: true

      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      # OREGON: usava filtro de velocidade no global_costmap.
      # O sim_nav_graph.launch.py inicia os servidores quando speed_filter:=True.
      filters: ["speed_filter"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 5.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          inf_is_valid: true
          # OREGON: valor importado do nav_routegraph.yaml.

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # OREGON: valores importados do nav_routegraph.yaml.
        inflate_unknown: true
        cost_scaling_factor: 10.0
        inflation_radius: 0.3

      # OREGON: plugin de filtro de velocidade.
      speed_filter:
        plugin: "nav2_costmap_2d::SpeedFilter"
        enabled: True
        filter_info_topic: "/speed_costmap_filter_info"
        speed_limit_topic: "/speed_limit"

      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0
    use_sim_time: True
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true
      # OREGON: usava allow_unknown: false em uma das configuracoes.

smoother_server:
  ros__parameters:
    use_sim_time: True
    # OREGON: suavizador usado pela BT de rota por grafo.
    smoother_plugins: ["savitzky_golay_smoother"]
    savitzky_golay_smoother:
      plugin: "nav2_smoother::SavitzkyGolaySmoother"
      do_refinement: true
      keep_start_orientation: true

    # SIM BOT: fallback anterior.
    # smoother_plugins: ["simple_smoother"]
    # simple_smoother:
    #   plugin: "nav2_smoother::SimpleSmoother"
    #   tolerance: 1.0e-10
    #   max_its: 1000
    #   do_refinement: True

behavior_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    use_sim_time: true
    enable_stamped_cmd_vel: false
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

robot_state_publisher:
  ros__parameters:
    use_sim_time: True

waypoint_follower:
  ros__parameters:
    use_sim_time: True
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 250

velocity_smoother:
  ros__parameters:
    use_sim_time: True
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 0.5]
    min_velocity: [0.0, 0.0, -0.5]
    max_accel: [0.15, 0.0, 0.2]
    max_decel: [-0.25, 0.0, -0.9]
    odom_topic: "odom"
    odom_duration: 0.1
    deadband_velocity: [0.015, 0.0, 0.06]
    velocity_timeout: 1.0
    enable_stamped_cmd_vel: false

    # OREGON: limites importados do nav_routegraph.yaml para teste.

route_server:
  ros__parameters:
    use_sim_time: True
    graph_filepath: "$(find-pkg-share nav_hub)/graphs/aceleradoras.json"
    boundary_radius_to_achieve_node: 1.0
    radius_to_achieve_node: 2.0
    smooth_corners: true
    # OREGON: operacoes usadas pelo route_server.
    operations: ["AdjustSpeedLimit", "ReroutingService", "CollisionMonitor"]
    ReroutingService:
      plugin: "nav2_route::ReroutingService"
    AdjustSpeedLimit:
      plugin: "nav2_route::AdjustSpeedLimit"
    CollisionMonitor:
      plugin: "nav2_route::CollisionMonitor"
      max_collision_dist: 3.0
    # OREGON: usa DistanceScorer + CostmapScorer. O CostmapScorer fica ativo
    # para pontuar custo do global_costmap, mas sem invalidar a rota.
    edge_cost_functions: ["DistanceScorer", "CostmapScorer"]
    DistanceScorer:
      plugin: "nav2_route::DistanceScorer"
    CostmapScorer:
      plugin: "nav2_route::CostmapScorer"
      # OREGON: false. Com true, o sim retornou NO_VALID_ROUTE porque o
      # costmap invalidava a rota completa.
      invalid_on_collision: false

speed_filter_mask_server:
  ros__parameters:
    use_sim_time: True
    topic_name: "/speed_filter_mask"
    yaml_filename: "$(find-pkg-share nav_hub)/maps/aceleradora_speed_mask.yaml"

speed_costmap_filter_info_server:
  ros__parameters:
    use_sim_time: True
    type: 1
    filter_info_topic: "/speed_costmap_filter_info"
    mask_topic: "/speed_filter_mask"
    base: 100.0
    multiplier: -1.0

